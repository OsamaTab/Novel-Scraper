name: Build and Release Docker Image Tarball

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Tag Name
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          # Build the image and tag it
          docker build -t novel-scraper:${{ steps.vars.outputs.tag || 'latest' }} .

      - name: Save Image to Tarball
        run: |
          # Save the image to a tar file and compress it
          docker save novel-scraper:${{ steps.vars.outputs.tag || 'latest' }} | gzip > novel-scraper.tar.gz

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: novel-scraper.tar.gz
          name: Release ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: If you run manually (workflow_dispatch), upload as an artifact instead
      - name: Upload Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: novel-scraper-docker-tar
          path: novel-scraper.tar.gz