name: Build and Release Docker Image Tarball

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Define the tag
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          
          echo "Building novel-scraper-api:$TAG_NAME..."
          
          # Build from root (.) but point to the Dockerfile inside app/
          docker build -t novel-scraper-api:$TAG_NAME -f app/Dockerfile .

      - name: Save and Compress
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          
          # Save the image to a compressed tarball
          docker save novel-scraper-api:$TAG_NAME | gzip > novel-scraper-api.tar.gz
          
          # Verify size (will fail the action if it's still 150kb)
          SIZE=$(stat -c%s "novel-scraper-api.tar.gz")
          echo "File size: $SIZE bytes"
          if [ $SIZE -lt 1000000 ]; then
            echo "Error: Tarball is too small. Build failed to include layers."
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: novel-scraper-api.tar.gz
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save as Action Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: novel-scraper-api-tar
          path: novel-scraper-api.tar.gz