name: Build and Release Docker Image Tarball

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          docker build -t novel-scraper-api:$TAG_NAME -f app/Dockerfile .

      - name: Save and Compress
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          docker save novel-scraper-api:$TAG_NAME | gzip > novel-scraper-api.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: novel-scraper-api.tar.gz
          name: Release ${{ github.ref_name }}
          # This adds your custom markdown to the release page automatically
          body: |
            ## 🚀 Installation & Setup
            
            ### Method 1: Loading the Pre-built Image (Fastest)
            1. Download the `novel-scraper-api.tar.gz` from the assets below.
            2. Load it into Docker:
               ```bash
               docker load -i novel-scraper-api.tar.gz
               ```
            3. Run it:
               ```bash
               docker run -p 8000:8000 --shm-size="2g" novel-scraper-api:${{ github.ref_name }}
               ```

            ### Method 2: Building Manually
            If you prefer to build it yourself:
            1. **Clone or download this repository.**
            2. **Build the Docker Image:**
               ```bash
               docker build -t novel-scraper-api .
               ```
            3. **Run the Container:**
               ```bash
               docker run -p 8000:8000 --shm-size="2g" novel-scraper-api
               ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save as Action Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: novel-scraper-api-tar
          path: novel-scraper-api.tar.gz
          retention-days: 5