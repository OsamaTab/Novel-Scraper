name: Build and Release Docker Image Tarball

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image Locally
        run: |
          # Get the tag name from the git ref
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          
          echo "Building image from app/Dockerfile with tag: $TAG_NAME"
          
          # -f points to the Dockerfile location
          # . sets the build context to the root (so 'COPY .' in Dockerfile works)
          docker build -t novel-scraper-api:$TAG_NAME -f app/Dockerfile .

      - name: Save and Compress Image
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME=latest
          
          echo "Saving image: novel-scraper-api:$TAG_NAME"
          
          # Save to tar, then compress with gzip
          docker save novel-scraper-api:$TAG_NAME | gzip > novel-scraper-api.tar.gz
          
          # --- SIZE CHECK ---
          FILESIZE=$(stat -c%s "novel-scraper-api.tar.gz")
          echo "Final compressed file size: $((FILESIZE / 1024 / 1024)) MB"
          if [ $FILESIZE -lt 1000000 ]; then
            echo "Error: Resulting tarball is too small ($FILESIZE bytes). Build likely failed."
            exit 1
          fi

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: novel-scraper-api.tar.gz
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: novel-scraper-api-docker-tar
          path: novel-scraper-api.tar.gz