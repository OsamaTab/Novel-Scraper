name: Build and Release Docker Image Tarball

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Tag Name
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          # Match the name you use locally: novel-scraper-api
          # We use --load to ensure the image is moved from the buildx cache to local docker images
          docker buildx build -t novel-scraper-api:${{ steps.vars.outputs.tag || 'latest' }} --load .

      - name: Verify Image and Save to Tarball
        run: |
          # List images to double check it exists
          docker images
          
          # Save the image. We use the specific name we just built.
          # Redirecting to gzip makes the download faster for you later.
          docker save novel-scraper-api:${{ steps.vars.outputs.tag || 'latest' }} | gzip > novel-scraper-api.tar.gz
          
          # Check size in logs to confirm it's around 400MB (uncompressed) or ~150-200MB (compressed)
          ls -lh novel-scraper-api.tar.gz

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: novel-scraper-api.tar.gz
          name: Release ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: novel-scraper-api-docker-tar
          path: novel-scraper-api.tar.gz